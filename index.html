<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Qwen Visual Studio & Presenter</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 380px; background: #252525; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #444; overflow-y: auto; }
        .editor { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; overflow: auto; position: relative; }
        h2 { color: #5e5ce6; margin-top: 0; }
        #qwenCode { width: 100%; height: 120px; background: #111; color: #0f0; border: 1px solid #333; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 10px; border-radius: 8px; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; width: 100%; color: white; transition: 0.3s; }
        .btn-draw { background: #5e5ce6; }
        .btn-present { background: #34c759; border: 2px solid #fff; }
        .btn-clear { background: #ff3b30; }
        #container { position: relative; cursor: crosshair; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        img { display: block; max-width: 90vw; max-height: 90vh; pointer-events: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .instr { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>👁️ Qwen Studio Pro</h2>
    <div class="instr">
        1. Charge ton affiche.<br>
        2. Donne un nom (ex: Titre).<br>
        3. <b>Dessine à la souris</b>.<br>
        4. Clique sur <b>Mode Présentation</b> !
    </div>

    <input type="file" id="imgInput" accept="image/*" style="margin-bottom: 15px;">
    
    <label>Nom de l'objet :</label>
    <input type="text" id="labelName" placeholder="Ex: Titre LAB" style="padding: 10px; border-radius: 5px; margin-bottom: 15px; background: #333; border: 1px solid #555; color: white;">

    <button class="btn btn-draw" onclick="mode = 'draw'; drawAll();">🖊️ Mode Dessin</button>
    <button class="btn btn-present" onclick="mode = 'present'; drawAll();">✨ MODE PRÉSENTATION</button>
