
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Qwen-VL Visualizer | Projet Académique</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 1100px; }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 850px) { .main { grid-template-columns: 1fr; } }
        
        textarea { width: 100%; height: 180px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; box-sizing: border-box; }
        .btn { background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        .btn-demo { background: #5856d6; width: auto; }
        
        /* Zone de prévisualisation */
        .preview-area { background: #333; border-radius: 10px; position: relative; min-height: 500px; display: flex; align-items: flex-start; justify-content: center; padding: 10px; border: 2px solid #ddd; }
        #wrapper { position: relative; display: inline-block; }
        #view { display: block; max-width: 100%; height: auto; border-radius: 4px; border: 1px solid white; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; }
        
        .status { font-size: 12px; color: #666; margin-top: 10px; padding: 8px; background: #eef; border-radius: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>Qwen-VL Emulator</h1>
        <button class="btn btn-demo" onclick="loadDemo()">Charger la Démo ✨</button>
    </div>

    <div class="main">
        <div class="sidebar">
            <label style="font-weight:bold">1. Choisir une Image</label>
            <input type="file" id="imgFile" accept="image/*" style="margin-bottom:15px; width:100%">
            
            <label style="font-weight:bold">2. Texte de Qwen</label>
            <textarea id="qwenText" placeholder="Collez le texte ici..."></textarea>
            
            <button class="btn" onclick="process()">Appliquer les Calques 👁️</button>
            <div id="log" class="status">En attente d'image...</div>
        </div>

        <div class="preview-area">
            <div id="wrapper">
                <img id="view" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                <canvas id="ovl"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const image = document.getElementById('view');
    const canvas = document.getElementById('ovl');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('log');

    // Charger la démo (Correction : on utilise une image qui accepte le CORS)
    function loadDemo() {
        image.src = "https://picsum.photos/id/1/800/600"; 
        document.getElementById('qwenText').value = '<ref>Ordinateur</ref><box>(200,150,750,850)</box>\n<ref>Clavier</ref><polygon>(800,200,800,800,950,800,950,200)</polygon>';
        log.innerText = "Démo chargée. Cliquez sur 'Appliquer'.";
    }

    // Charger fichier local (Lecture simplifiée)
    document.getElementById('imgFile').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (ev) => { 
            image.src = ev.target.result; 
            log.innerText = "Image chargée avec succès.";
        };
        reader.readAsDataURL(file);
    };

    function process() {
        if (!image.naturalWidth || image.naturalWidth === 0) {
            alert("L'image n'est pas encore chargée ou est invalide.");
            return;
        }
        
        // Aligner le canvas sur la taille réelle de l'image
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        
        const text = document.getElementById('qwenText').value;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const regex = /<ref>(.*?)<\/ref>\s*<(box|polygon)>\((.*?)\)<\/\2>/g;
        let match;
        let count = 0;

        const colors = ['rgba(255, 50, 50, 0.5)', 'rgba(50, 255, 50, 0.5)', 'rgba(50, 150, 255, 0.5)'];
        const borders = ['#ff0000', '#00ff00', '#0066ff'];

        while ((match = regex.exec(text)) !== null) {
            const label = match[1];
            const type = match[2];
            const coords = match[3].split(',').map(Number);
            const col = colors[count % colors.length];
            const brd = borders[count % borders.length];

            ctx.beginPath();
            if (type === 'box') {
                const y1 = coords[0] * canvas.height / 1000;
                const x1 = coords[1] * canvas.width / 1000;
                const y2 = coords[2] * canvas.height / 1000;
                const x2 = coords[3] * canvas.width / 1000;
                ctx.rect(x1, y1, x2 - x1, y2 - y1);
                drawLabel(label, x1, y1, brd);
            } else {
                ctx.moveTo(coords[1] * canvas.width / 1000, coords[0] * canvas.height / 1000);
                for (let j = 0; j < coords.length; j += 2) {
                    ctx.lineTo(coords[j+1] * canvas.width / 1000, coords[j] * canvas.height / 1000);
                }
                ctx.closePath();
                drawLabel(label, coords[1] * canvas.width / 1000, coords[0] * canvas.height / 1000, brd);
            }

            ctx.fillStyle = col;
            ctx.fill();
            ctx.strokeStyle = brd;
            ctx.lineWidth = Math.max(5, canvas.width / 150);
            ctx.stroke();
            count++;
        }
        log.innerText = count + " calques appliqués !";
    }

    function drawLabel(txt, x, y, color) {
        const fontSize = Math.max(18, canvas.width/35);
        ctx.font = `bold ${fontSize}px sans-serif`;
        const tw = ctx.measureText(txt).width + 20;
        const th = fontSize * 1.4;
        ctx.fillStyle = color;
        ctx.fillRect(x, y - th, tw, th);
        ctx.fillStyle = "white";
        ctx.fillText(txt, x + 10, y - (th/4));
    }
</script>

</body>
</html>
