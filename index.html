<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Qwen Visual Studio | Créateur de Calques</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 350px; background: #252525; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .editor { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; overflow: auto; }
        
        h2 { margin-top: 0; color: #5e5ce6; font-size: 18px; }
        p { font-size: 13px; color: #aaa; }
        
        #qwenCode { width: 100%; flex: 1; background: #111; color: #0f0; border: 1px solid #333; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 10px; border-radius: 8px; }
        
        .btn { background: #5e5ce6; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-clear { background: #ff3b30; }
        
        #container { position: relative; cursor: crosshair; }
        img { display: block; max-width: 90vw; max-height: 90vh; user-select: none; -webkit-user-drag: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .instr { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>👁️ Qwen Studio</h2>
    <div class="instr">
        1. Charge ton affiche.<br>
        2. <b>Dessine avec ta souris</b> sur l'image pour créer un calque.<br>
        3. Copie le code généré ci-dessous.
    </div>

    <label>Charger ton affiche :</label>
    <input type="file" id="imgInput" accept="image/*" style="margin: 10px 0 20px 0;">

    <label>Nom de l'objet :</label>
    <input type="text" id="labelName" placeholder="Ex: Titre, Enfant..." style="padding: 8px; border-radius: 5px; border: none; margin-bottom: 10px;">

    <button class="btn btn-clear" onclick="clearAll()">Tout effacer</button>
    
    <label>Code Qwen généré :</label>
    <textarea id="qwenCode" readonly></textarea>
    
    <p style="margin-top:20px;">Utilise ce code pour ta présentation ou pour simuler la réponse de l'IA.</p>
</div>

<div class="editor">
    <div id="container">
        <img id="source" src="">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const img = document.getElementById('source');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const qwenCode = document.getElementById('qwenCode');
    const labelInput = document.getElementById('labelName');

    let startX, startY, isDrawing = false;
    let shapes = [];

    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            img.src = ev.target.result;
            img.onload = () => {
                canvas.width = img.clientWidth;
                canvas.height = img.clientHeight;
                shapes = [];
                updateCode();
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        isDrawing = true;
    };

    canvas.onmousemove = (e) => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const curX = e.clientX - rect.left;
        const curY = e.clientY - rect.top;
        
        drawAll();
        ctx.strokeStyle = '#5e5ce6';
        ctx.lineWidth = 2;
        ctx.strokeRect(startX, startY, curX - startX, curY - startY);
    };

    canvas.onmouseup = (e) => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const endX = e.clientX - rect.left;
        const endY = e.clientY - rect.top;
        isDrawing = false;

        const label = labelInput.value || "Objet_" + (shapes.length + 1);
        
        // Sauvegarder la forme en coordonnées 0-1000 (Format Qwen)
        const ymin = Math.round((Math.min(startY, endY) / canvas.height) * 1000);
        const xmin = Math.round((Math.min(startX, endX) / canvas.width) * 1000);
        const ymax = Math.round((Math.max(startY, endY) / canvas.height) * 1000);
        const xmax = Math.round((Math.max(startX, endX) / canvas.width) * 1000);

        shapes.push({ label, box: [ymin, xmin, ymax, xmax], px: [startX, startY, endX, endY] });
        updateCode();
        drawAll();
    };

    function drawAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        shapes.forEach((s, i) => {
            const x = Math.min(s.px[0], s.px[2]);
            const y = Math.min(s.px[1], s.px[3]);
            const w = Math.abs(s.px[2] - s.px[0]);
            const h = Math.abs(s.px[3] - s.px[1]);

            ctx.fillStyle = 'rgba(94, 92, 230, 0.3)';
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = '#5e5ce6';
            ctx.strokeRect(x, y, w, h);
            
            ctx.fillStyle = '#5e5ce6';
            ctx.font = 'bold 12px Arial';
            ctx.fillText(s.label, x, y - 5);
        });
    }

    function updateCode() {
        let code = "";
        shapes.forEach(s => {
            code += `<ref>${s.label}</ref><box>(${s.box[0]},${s.box[1]},${s.box[2]},${s.box[3]})</box>\n`;
        });
        qwenCode.value = code;
    }

    function clearAll() {
        shapes = [];
        updateCode();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
</script>

</body>
</html>
