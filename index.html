<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Qwen-VL Visualizer | Projet Académique</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 1100px; }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 850px) { .main { grid-template-columns: 1fr; } }
        
        textarea { width: 100%; height: 150px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; box-sizing: border-box; }
        .btn { background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        .btn-demo { background: #5856d6; width: auto; }
        
        /* Conteneur Critique pour l'affichage */
        .preview-area { background: #333; border-radius: 10px; position: relative; min-height: 400px; display: flex; align-items: flex-start; justify-content: center; padding: 10px; }
        #wrapper { position: relative; display: inline-block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        img { display: block; max-width: 100%; height: auto; border-radius: 4px; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .status { font-size: 12px; color: #666; margin-top: 10px; padding: 8px; background: #eef; border-radius: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>Qwen-VL Emulator</h1>
        <button class="btn btn-demo" onclick="loadDemo()">Charger la Démo ✨</button>
    </div>

    <div class="main">
        <div class="sidebar">
            <label style="font-weight:bold">1. Image</label>
            <input type="file" id="imgFile" accept="image/*" style="margin-bottom:15px; width:100%">
            
            <label style="font-weight:bold">2. Code Qwen</label>
            <textarea id="qwenText" placeholder="Collez le texte ici..."></textarea>
            
            <button class="btn" onclick="process()">Appliquer les Calques 👁️</button>
            <div id="log" class="status">En attente d'image...</div>
        </div>

        <div class="preview-area">
            <div id="wrapper">
                <img id="view" src="" style="display:none">
                <canvas id="ovl"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const image = document.getElementById('view');
    const canvas = document.getElementById('ovl');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('log');

    // Charger la démo
    function loadDemo() {
        image.crossOrigin = "anonymous"; // Évite les erreurs de sécurité
        image.src = "https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?w=1000"; 
        document.getElementById('qwenText').value = '<ref>Ordinateur</ref><box>(200,150,750,850)</box>\n<ref>Tasse</ref><polygon>(600,50,600,250,850,250,850,50)</polygon>';
        image.style.display = 'block';
        log.innerText = "Démo chargée. Cliquez sur 'Appliquer'.";
    }

    // Charger fichier local
    document.getElementById('imgFile').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            image.src = ev.target.result; 
            image.style.display = 'block';
            log.innerText = "Image prête.";
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function process() {
        if (!image.src) { alert("Chargez une image d'abord !"); return; }
        
        // 1. Aligner le canvas sur la taille RÉELLE de l'image
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        
        const text = document.getElementById('qwenText').value;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Regex plus flexible (ignore les espaces)
        const regex = /<ref>(.*?)<\/ref>\s*<(box|polygon)>\((.*?)\)<\/\2>/g;
        let match;
        let count = 0;

        const colors = ['rgba(255,50,50,0.5)', 'rgba(50,255,50,0.5)', 'rgba(50,150,255,0.5)'];
        const borders = ['#ff0000', '#00ff00', '#0066ff'];

        while ((match = regex.exec(text)) !== null) {
            const label = match[1];
            const type = match[2];
            const coords = match[3].split(',').map(Number);
            const col = colors[count % 3];
            const brd = borders[count % 3];

            ctx.beginPath();
            if (type === 'box') {
                // Qwen: ymin, xmin, ymax, xmax
                const y1 = coords[0] * canvas.height / 1000;
                const x1 = coords[1] * canvas.width / 1000;
                const y2 = coords[2] * canvas.height / 1000;
                const x2 = coords[3] * canvas.width / 1000;
                ctx.rect(x1, y1, x2 - x1, y2 - y1);
                drawLabel(label, x1, y1, brd);
            } else {
                ctx.moveTo(coords[1] * canvas.width / 1000, coords[0] * canvas.height / 1000);
                for (let j = 0; j < coords.length; j += 2) {
                    ctx.lineTo(coords[j+1] * canvas.width / 1000, coords[j] * canvas.height / 1000);
                }
                ctx.closePath();
                drawLabel(label, coords[1] * canvas.width / 1000, coords[0] * canvas.height / 1000, brd);
            }

            ctx.fillStyle = col;
            ctx.fill();
            ctx.strokeStyle = brd;
            ctx.lineWidth = Math.max(4, canvas.width / 200);
            ctx.stroke();
            count++;
        }
        log.innerText = count + " calques appliqués avec succès !";
    }

    function drawLabel(txt, x, y, color) {
        ctx.font = `bold ${Math.max(16, canvas.width/40)}px sans-serif`;
        const w = ctx.measureText(txt).width + 20;
        const h = Math.max(30, canvas.width/25);
        ctx.fillStyle = color;
        ctx.fillRect(x, y - h, w, h);
        ctx.fillStyle = "white";
        ctx.fillText(txt, x + 10, y - (h/4));
    }
</script>

</body>
</html>
