<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Qwen-VL Visualizer | Projet Académique</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; margin: 0; }
        .app-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 1200px; }
        .header { border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .main { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        textarea { width: 100%; height: 180px; border: 1px solid #ddd; border-radius: 10px; padding: 12px; font-family: monospace; box-sizing: border-box; font-size: 13px; }
        .btn { background: #007aff; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; transition: background 0.3s; }
        .btn:hover { background: #0056b3; }
        .btn-secondary { background: #5856d6; }
        .btn-download { background: #34c759; margin-top: 20px; }
        .preview-area { background: #fafafa; border: 2px dashed #ccc; border-radius: 15px; position: relative; min-height: 500px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #canvas-container { position: relative; display: inline-block; line-height: 0; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; }
        img { max-width: 100%; height: auto; display: block; border-radius: 5px; }
        #placeholderText { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <div>
            <h1 style="margin:0; color:#1d1d1f;">Qwen-VL Emulator</h1>
            <small style="color:#888;">Visualisation des couches sémantiques (Bounding Boxes & Segmentation)</small>
        </div>
        <button class="btn btn-secondary" style="width:auto;" onclick="loadDemo()">Charger Démo ✨</button>
    </div>

    <div class="main">
        <div class="inputs">
            <label>1. Choisir une Image</label>
            <input type="file" id="imgLoad" accept="image/*" style="margin-bottom:20px;">
            
            <label>2. Texte de Qwen (Format &lt;ref&gt;)</label>
            <textarea id="qwenInput" placeholder="<ref>objet</ref><box>(y1,x1,y2,x2)</box>"></textarea>
            
            <button class="btn" onclick="draw()">Appliquer les Calques 👁️</button>
            <button id="dlBtn" class="btn btn-download" style="display:none;" onclick="download()">Télécharger le résultat 📥</button>
        </div>

        <div class="preview-area">
            <div id="canvas-container">
                <img id="baseImg" src="">
                <canvas id="ovl"></canvas>
            </div>
            <p id="placeholderText">Aucune image chargée</p>
        </div>
    </div>
</div>

<script>
    const img = document.getElementById('baseImg');
    const cvs = document.getElementById('ovl');
    const ctx = cvs.getContext('2d');
    const qwenInput = document.getElementById('qwenInput');

    // Démo automatique
    function loadDemo() {
        document.getElementById('placeholderText').style.display = 'none';
        img.src = "https://images.unsplash.com/photo-1517336712642-19e09961446a?w=800";
        qwenInput.value = '<ref>Ordinateur Portable</ref><box>(280,250,720,750)</box>\n<ref>Tasse à café</ref><polygon>(650,100,650,220,850,220,850,100)</polygon>';
        img.onload = function() { 
            syncSize(); 
            draw(); 
        };
    }

    // Chargement image utilisateur
    document.getElementById('imgLoad').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(ev) { 
            img.src = ev.target.result; 
            document.getElementById('placeholderText').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    img.onload = syncSize;

    function syncSize() {
        cvs.width = img.naturalWidth;
        cvs.height = img.naturalHeight;
    }

    function draw() {
        if (!img.src || img.src.includes('undefined')) return;
        
        const text = qwenInput.value;
        const w = cvs.width; 
        const h = cvs.height;
        ctx.clearRect(0, 0, w, h);
        
        const colors = ['rgba(255,50,50,0.4)', 'rgba(50,255,50,0.4)', 'rgba(50,100,255,0.4)'];
        const strokes = ['#ff3232', '#32ff32', '#3264ff'];

        const reg = /<ref>(.*?)<\/ref>\s*<(box|polygon)>\((.*?)\)<\/\2>/g;
        let m, i = 0;
        
        while ((m = reg.exec(text)) !== null) {
            const label = m[1];
            const type = m[2];
            const coords = m[3].split(',').map(Number);
            const color = colors[i % 3];
            const stroke = strokes[i % 3];

            ctx.beginPath();
            if(type === 'box') {
                const [y1, x1, y2, x2] = coords.map((v, k) => k % 2 === 0 ? v * h / 1000 : v * w / 1000);
                ctx.rect(x1, y1, x2 - x1, y2 - y1);
                labelAt(label, x1, y1, stroke);
            } else {
                ctx.moveTo(coords[1] * w / 1000, coords[0] * h / 1000);
                for(let j = 0; j < coords.length; j += 2) {
                    ctx.lineTo(coords[j+1] * w / 1000, coords[j] * h / 1000);
                }
                ctx.closePath();
                labelAt(label, coords[1] * w / 1000, coords[0] * h / 1000, stroke);
            }
            ctx.fillStyle = color; ctx.fill();
            ctx.strokeStyle = stroke; ctx.lineWidth = Math.max(3, w/200); ctx.stroke();
            i++;
        }
        document.getElementById('dlBtn').style.display = 'block';
    }

    function labelAt(txt, x, y, c) {
        ctx.font = `bold ${Math.max(14, cvs.width/40)}px sans-serif`;
        const tw = ctx.measureText(txt).width;
        const th = Math.max(20, cvs.width/30);
        ctx.fillStyle = c;
        ctx.fillRect(x, y - th, tw + 20, th);
        ctx.fillStyle = "white";
        ctx.fillText(txt, x + 10, y - th/4);
    }

    function download() {
        const finalCvs = document.createElement('canvas');
        finalCvs.width = img.naturalWidth;
        finalCvs.height = img.naturalHeight;
        const fctx = finalCvs.getContext('2d');
        fctx.drawImage(img, 0, 0);
        fctx.drawImage(cvs, 0, 0);
        const link = document.createElement('a');
        link.download = 'export_qwen.png';
        link.href = finalCvs.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
